name: Blog Auto - publish next article

on:
  schedule:
    # Lun-Ven, 06:00-09:00 UTC (08h-11h Paris CEST été, 07h-10h hiver)
    # Random via multiple windows pour eviter heure pile (regle STACK-2026)
    - cron: '17 6 * * 1-5'
    - cron: '43 7 * * 1-5'
    - cron: '29 8 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force next unpublished article (bypass schedule)'
        required: false
        default: 'false'

concurrency:
  group: blog-auto
  cancel-in-progress: false

jobs:
  publish:
    runs-on: self-hosted
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: blog-auto/requirements.txt

      - run: pip install -r blog-auto/requirements.txt

      - name: Run publish.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CLAUDE_MODEL: claude-sonnet-4-6
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python3 blog-auto/publish.py --force
          else
            python3 blog-auto/publish.py
          fi

      - name: Ping IndexNow
        if: success()
        continue-on-error: true
        run: |
          curl -s -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" \
            -d '{
              "host":"score-immo.fr",
              "key":"si-scoreimmo-indexnow",
              "keyLocation":"https://score-immo.fr/si-scoreimmo-indexnow.txt",
              "urlList":["https://score-immo.fr/sitemap-index.xml"]
            }' || true
