name: Blog Auto - queue next article

# v2 queue-only : ce workflow N'APPELLE PLUS l'API Anthropic.
# Il sélectionne le prochain article échu, pré-récupère une image Unsplash, et écrit
# un spec dans blog-auto/queue/{index}.json (commit + push). La génération du contenu
# est faite par la Routine claude.ai (abo Max) qui poll la queue. => 0 € Anthropic.

on:
  schedule:
    # Lun-Ven, 06:00-09:00 UTC (08h-11h Paris CEST été, 07h-10h hiver)
    # Random via multiple windows pour eviter heure pile (regle STACK-2026)
    - cron: '17 6 * * 1-5'
    - cron: '43 7 * * 1-5'
    - cron: '29 8 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force next unpublished article (bypass schedule)'
        required: false
        default: 'false'

concurrency:
  group: blog-auto
  cancel-in-progress: false

jobs:
  queue:
    runs-on: self-hosted
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Queue next article (no API call)
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python3 blog-auto/publish.py --force
          else
            python3 blog-auto/publish.py
          fi

      - name: Ping IndexNow
        if: success()
        continue-on-error: true
        run: |
          curl -s -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" \
            -d '{
              "host":"score-immo.fr",
              "key":"si-scoreimmo-indexnow",
              "keyLocation":"https://score-immo.fr/si-scoreimmo-indexnow.txt",
              "urlList":["https://score-immo.fr/sitemap-index.xml"]
            }' || true
